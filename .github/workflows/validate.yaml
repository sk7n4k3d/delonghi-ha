name: Validate

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  json:
    name: JSON / YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate JSON translations
        run: |
          python -c "
          import json, glob, sys
          errors = []
          for f in sorted(glob.glob('custom_components/*/translations/*.json')):
              try:
                  json.load(open(f))
                  print(f'OK  {f}')
              except json.JSONDecodeError as e:
                  errors.append(f'{f}: {e}')
                  print(f'FAIL {f}: {e}')
          if errors:
              sys.exit(1)
          "
      - name: Validate services.yaml
        run: |
          pip install pyyaml -q
          python -c "
          import yaml
          with open('custom_components/delonghi_coffee/services.yaml') as f:
              data = yaml.safe_load(f)
          print(f'Services: {list(data.keys())}')
          "
