name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build release zip
        run: |
          cd custom_components/delonghi_coffee
          zip -r ../../delonghi_coffee.zip .

      - name: Detect prerelease from tag
        id: prerelease
        env:
          TAG: ${{ github.ref_name }}
        run: |
          # SemVer 2.0: anything after `MAJOR.MINOR.PATCH-` is a prerelease
          # Matches: vX.Y.Z-beta.N, vX.Y.Z-beta5, vX.Y.Z-rc1, vX.Y.Z-alpha, vX.Y.Z-dev, vX.Y.Z-pre, vX.Y.Z-snapshot
          # Does NOT match: vX.Y.Z (stable)
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+- ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Detected PRERELEASE tag: $TAG"
          elif [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Detected STABLE tag: $TAG"
          else
            echo "::error::Tag '$TAG' does not match SemVer pattern vX.Y.Z[-suffix]" >&2
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: delonghi_coffee.zip
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          make_latest: ${{ steps.prerelease.outputs.is_prerelease == 'false' }}
