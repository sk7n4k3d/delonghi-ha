name: Feature request
description: Suggest a new feature or an improvement
labels: ["enhancement"]
body:
  - type: input
    id: machine
    attributes:
      label: Coffee machine model (if relevant)
      placeholder: ECAM______
    validations:
      required: false

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that you can't do today?
    validations:
      required: true

  - type: textarea
    id: proposed
    attributes:
      label: Proposed solution
      description: How could the integration solve this? Rough ideas are fine.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you already tried or other approaches you ruled out.
    validations:
      required: false
