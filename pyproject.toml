[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM"]
ignore = ["E501", "SIM108"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.coverage.run]
source = ["custom_components/delonghi_coffee"]

[tool.coverage.report]
fail_under = 50
show_missing = true
skip_covered = false
