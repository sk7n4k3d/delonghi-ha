brew_custom:
  name: Brew Custom Beverage
  description: Prepare a custom beverage with specific parameters
  fields:
    beverage:
      name: Beverage
      description: Base beverage type
      required: true
      selector:
        select:
          options:
            - espresso
            - coffee
            - long_coffee
            - doppio
            - americano
            - cappuccino
            - latte_macchiato
            - caffe_latte
            - flat_white
            - espresso_macchiato
            - hot_milk
            - hot_water
            - tea
            - cortado
    coffee_qty:
      name: Coffee Quantity (mL)
      description: Amount of coffee in mL (20-240)
      selector:
        number:
          min: 20
          max: 240
          step: 5
          unit_of_measurement: mL
    milk_qty:
      name: Milk Quantity (mL)
      description: Amount of milk in mL (0-500). Only for milk drinks.
      selector:
        number:
          min: 0
          max: 500
          step: 5
          unit_of_measurement: mL
    water_qty:
      name: Hot Water Quantity (mL)
      description: Amount of hot water in mL (25-500). Only for water/tea/americano.
      selector:
        number:
          min: 25
          max: 500
          step: 5
          unit_of_measurement: mL
    taste:
      name: Taste / Strength
      description: Coffee strength (1=mild, 5=strong)
      default: 3
      selector:
        number:
          min: 1
          max: 5
          step: 1
    milk_froth:
      name: Milk Froth Level
      description: "Milk froth (1=low froth, 2=high froth)"
      default: 2
      selector:
        number:
          min: 1
          max: 3
          step: 1
    temperature:
      name: Temperature
      description: "Beverage temperature (0=low, 1=medium, 2=high)"
      default: 1
      selector:
        number:
          min: 0
          max: 2
          step: 1
    profile:
      name: Profile
      description: "User profile (1-5). Defaults to currently selected profile."
      selector:
        number:
          min: 1
          max: 5
          step: 1

cancel_brew:
  name: Cancel Brew
  description: Cancel the current brewing operation

sync_recipes:
  name: Sync Recipes
  description: Force the machine to synchronize its recipes to the cloud
  fields:
    profile:
      name: Profile
      description: "User profile to sync (1-5). Defaults to currently selected profile."
      selector:
        number:
          min: 1
          max: 5
          step: 1

select_bean_profile:
  name: Select Bean Profile
  description: >
    Activate one of the 7 Bean Adapt profiles on the machine (ECAM 0xB9).
    Issue #7 — opcode shared by @MattG-K.
  fields:
    slot:
      name: Slot
      description: "Bean profile slot (1-7)."
      required: true
      selector:
        number:
          min: 1
          max: 7
          step: 1

write_bean_profile:
  name: Write Bean Profile
  description: >
    Write (create/overwrite) a Bean Adapt profile — name plus raw
    temperature / intensity / grinder tail bytes (ECAM 0xBB). The tail
    byte mapping is the same one the Coffee Link app sends on the wire.
    If the field order or ranges turn out to need tweaking per model,
    please comment on issue #7 with the exact bytes you wrote.
  fields:
    slot:
      name: Slot
      description: "Bean profile slot (1-7)."
      required: true
      selector:
        number:
          min: 1
          max: 7
          step: 1
    name:
      name: Name
      description: "Profile name (max 20 UTF-16 characters)."
      required: true
      selector:
        text:
    temperature:
      name: Temperature raw byte
      description: >
        Raw temperature byte on the wire. MattG-K capture for
        'high' = 10 (0x0A). Confirmed magic values still being
        catalogued in issue #7.
      default: 10
      selector:
        number:
          min: 0
          max: 255
          step: 1
    intensity:
      name: Intensity raw byte
      description: >
        Raw intensity byte on the wire. MattG-K capture for
        'strong' = 2 (0x02).
      default: 2
      selector:
        number:
          min: 0
          max: 255
          step: 1
    grinder:
      name: Grinder raw byte
      description: >
        Raw grinder byte on the wire. MattG-K capture for grinder
        level 5 = 4 (0x04) — values appear to be 0-indexed.
      default: 4
      selector:
        number:
          min: 0
          max: 255
          step: 1
    flag1:
      name: Flag 1
      description: "First trailing boolean flag — defaults to 0."
      default: 0
      selector:
        number:
          min: 0
          max: 1
          step: 1
    flag2:
      name: Flag 2
      description: "Second trailing boolean flag — defaults to 1 (matches Coffee Link capture)."
      default: 1
      selector:
        number:
          min: 0
          max: 1
          step: 1

set_baseline_from_screen:
  name: Set counter baseline (from machine UI)
  description: >
    Override counter sensors with values read off the touchscreen — works around
    the Eletta Explore firmware bug where d5XX/d7XX stats are only pushed to the
    Ayla cloud on rare boot-time events. Each field is optional; only set what
    you see on screen. Sensors will expose max(cloud, baseline) so the cloud
    automatically reclaims them as soon as it pushes a higher value.
  fields:
    total_beverages:
      name: Tot. seulement café
      description: Total coffee-only beverages shown on the machine's Statistics screen.
      example: 1476
      selector:
        number:
          min: 0
          max: 100000
          step: 1
          unit_of_measurement: cups
    total_espressos:
      name: Tot. espressos (alt naming)
      description: Some firmwares expose total_espressos instead of total_beverages — set the same UI number here.
      example: 1476
      selector:
        number:
          min: 0
          max: 100000
          step: 1
          unit_of_measurement: cups
    espresso:
      name: Espressos
      example: 1303
      selector:
        number:
          min: 0
          max: 100000
          step: 1
          unit_of_measurement: cups
    coffee:
      name: Coffees
      selector:
        number:
          min: 0
          max: 100000
          step: 1
          unit_of_measurement: cups
    long_coffee:
      name: Long Coffees
      selector:
        number:
          min: 0
          max: 100000
          step: 1
          unit_of_measurement: cups
    doppio:
      name: Doppios
      selector:
        number:
          min: 0
          max: 100000
          step: 1
          unit_of_measurement: cups
    americano:
      name: Americanos
      selector:
        number:
          min: 0
          max: 100000
          step: 1
          unit_of_measurement: cups
    cappuccino:
      name: Cappuccinos
      selector:
        number:
          min: 0
          max: 100000
          step: 1
          unit_of_measurement: cups
    tea:
      name: Tot. thés
      example: 35
      selector:
        number:
          min: 0
          max: 100000
          step: 1
          unit_of_measurement: cups
    hot_water:
      name: Tot. eaux chaudes
      example: 35
      selector:
        number:
          min: 0
          max: 100000
          step: 1
          unit_of_measurement: cups
    descale_count:
      name: Tot. détartrages
      example: 3
      selector:
        number:
          min: 0
          max: 1000
          step: 1
          unit_of_measurement: times
    filter_replacements:
      name: Tot. filtres
      example: 1
      selector:
        number:
          min: 0
          max: 1000
          step: 1
          unit_of_measurement: times
    beverages_since_descale:
      name: Boissons depuis détartrage
      description: Useful after a descale cycle the cloud didn't see.
      selector:
        number:
          min: 0
          max: 100000
          step: 1
          unit_of_measurement: cups
    grounds_count:
      name: Marcs éjectés
      selector:
        number:
          min: 0
          max: 100000
          step: 1
          unit_of_measurement: pucks
    total_water_liters:
      name: Tot. litres eau
      description: Litres on screen. Stored internally as ml.
      example: 167
      selector:
        number:
          min: 0
          max: 10000
          step: 0.1
          unit_of_measurement: L

reset_local_baseline:
  name: Reset counter baselines
  description: >
    Drop every locally-stored baseline override and revert sensors to whatever
    the cloud reports. Useful if the firmware finally catches up or you set a
    wrong value.
